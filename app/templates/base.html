<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Contable RUS{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Estilos Liquid Glass -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glass.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ===== TOGGLE PARA MÓVIL ===== -->
    <button class="mobile-toggle" id="mobileToggle" aria-label="Abrir menú">
        <i class="bi bi-list"></i>
    </button>

    <!-- ===== SIDEBAR ===== -->
    <nav class="sidebar" id="sidebar">
        <!-- Logo -->
        <div class="sidebar-logo">
            <div class="logo-icon">📊</div>
            <div>
                <div class="logo-name">Mi Negocio</div>
                <div class="logo-sub">CONTROL FINANCIERO</div>
            </div>
        </div>

        <!-- Menú de navegación -->
        <ul class="nav-menu">
            <li class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                <a href="{{ url_for('index') }}" class="nav-link">
                    <span class="nav-icon">🏠</span> Inicio
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'subir' %}active{% endif %}">
                <a href="{{ url_for('subir') }}" class="nav-link">
                    <span class="nav-icon">📤</span> Subir Archivos
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'ver_datos' %}active{% endif %}">
                <a href="{{ url_for('ver_datos') }}" class="nav-link">
                    <span class="nav-icon">📋</span> Ver Datos
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'reportes' %}active{% endif %}">
                <a href="{{ url_for('reportes') }}" class="nav-link">
                    <span class="nav-icon">📊</span> Reportes
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'carpetas' %}active{% endif %}">
                <a href="{{ url_for('carpetas') }}" class="nav-link">
                    <span class="nav-icon">📁</span> Gestión Carpetas
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'backup' %}active{% endif %}">
                <a href="{{ url_for('backup') }}" class="nav-link">
                    <span class="nav-icon">💾</span> Backup
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'historial' %}active{% endif %}">
                <a href="{{ url_for('historial') }}" class="nav-link">
                    <span class="nav-icon">📜</span> Historial
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'configuracion' %}active{% endif %}">
                <a href="{{ url_for('configuracion') }}" class="nav-link">
                    <span class="nav-icon">⚙️</span> Configuración
                </a>
            </li>
        </ul>

        <!-- Footer del sidebar -->
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.03);">
            <div style="color: rgba(255,255,255,0.15); font-size: 0.6rem; text-align: center; letter-spacing: 0.5px;">
                v3.2 · Flask
            </div>
        </div>
    </nav>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="main-content" id="mainContent">
        <div style="height: 10px;"></div>
        {% block content %}{% endblock %}
    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggle para móvil
        var mobileToggle = document.getElementById('mobileToggle');
        var sidebar = document.getElementById('sidebar');

        if (mobileToggle) {
            mobileToggle.addEventListener('click', function() {
                sidebar.classList.toggle('mobile-open');
                var icon = this.querySelector('i');
                if (icon) {
                    icon.classList.toggle('bi-list');
                    icon.classList.toggle('bi-x');
                }
            });
        }

        document.addEventListener('click', function(event) {
            if (window.innerWidth <= 768) {
                var isClickInsideSidebar = sidebar.contains(event.target);
                var isClickOnToggle = mobileToggle && mobileToggle.contains(event.target);

                if (!isClickInsideSidebar && !isClickOnToggle && sidebar.classList.contains('mobile-open')) {
                    sidebar.classList.remove('mobile-open');
                    var icon = mobileToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('bi-x');
                        icon.classList.add('bi-list');
                    }
                }
            }
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768 && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
                var icon = mobileToggle?.querySelector('i');
                if (icon) {
                    icon.classList.remove('bi-x');
                    icon.classList.add('bi-list');
                }
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
