<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Contable RUS{% endblock %}</title>

    <!-- Bootstrap y Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Estilos del sistema -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Botón para móvil -->
    <button class="mobile-toggle" id="mobileToggle" aria-label="Abrir menú">
        <i class="bi bi-list"></i>
    </button>

    <!-- Menú lateral -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">📊</div>
            <div>
                <div class="logo-name">Mi Negocio</div>
                <div class="logo-sub">CONTROL FINANCIERO</div>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item {% if request.endpoint == 'main.index' %}active{% endif %}">
                <a href="{{ url_for('main.index') }}" class="nav-link">
                    <span class="nav-icon">🏠</span> Inicio
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.subir' %}active{% endif %}">
                <a href="{{ url_for('main.subir') }}" class="nav-link">
                    <span class="nav-icon">📤</span> Subir Archivos
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.ver_datos' %}active{% endif %}">
                <a href="{{ url_for('main.ver_datos') }}" class="nav-link">
                    <span class="nav-icon">📋</span> Ver Datos
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.reportes' %}active{% endif %}">
                <a href="{{ url_for('main.reportes') }}" class="nav-link">
                    <span class="nav-icon">📊</span> Reportes
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.carpetas' %}active{% endif %}">
                <a href="{{ url_for('main.carpetas') }}" class="nav-link">
                    <span class="nav-icon">📁</span> Gestion Carpetas
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.backup' %}active{% endif %}">
                <a href="{{ url_for('main.backup') }}" class="nav-link">
                    <span class="nav-icon">💾</span> Backup
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.historial' %}active{% endif %}">
                <a href="{{ url_for('main.historial') }}" class="nav-link">
                    <span class="nav-icon">📜</span> Historial
                </a>
            </li>
            <li class="nav-item {% if request.endpoint == 'main.configuracion' %}active{% endif %}">
                <a href="{{ url_for('main.configuracion') }}" class="nav-link">
                    <span class="nav-icon">⚙️</span> Configuracion
                </a>
            </li>
        </ul>

        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.03);">
            <div style="color: rgba(255,255,255,0.15); font-size: 0.6rem; text-align: center; letter-spacing: 0.5px;">
                v3.2 · Flask
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="main-content" id="mainContent">
        <div style="height: 10px;"></div>
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts del sistema (UX mejorada) -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notificaciones.js') }}"></script>
    <script src="{{ url_for('static', filename='js/paginacion.js') }}"></script>

    <!-- Script para el menú móvil -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileToggle = document.getElementById('mobileToggle');
            const sidebar = document.getElementById('sidebar');

            if (mobileToggle) {
                mobileToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('mobile-open');
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('bi-list');
                        icon.classList.toggle('bi-x');
                    }
                });
            }

            // Cerrar menú al hacer clic fuera
            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 768) {
                    const isClickInsideSidebar = sidebar.contains(event.target);
                    const isClickOnToggle = mobileToggle && mobileToggle.contains(event.target);

                    if (!isClickInsideSidebar && !isClickOnToggle && sidebar.classList.contains('mobile-open')) {
                        sidebar.classList.remove('mobile-open');
                        const icon = mobileToggle?.querySelector('i');
                        if (icon) {
                            icon.classList.remove('bi-x');
                            icon.classList.add('bi-list');
                        }
                    }
                }
            });

            // Cerrar menú al redimensionar
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768 && sidebar.classList.contains('mobile-open')) {
                    sidebar.classList.remove('mobile-open');
                    const icon = mobileToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('bi-x');
                        icon.classList.add('bi-list');
                    }
                }
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
