{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1 class="main-title">📤 Subir Archivos</h1>
    <div class="glass-card text-center">
        <p style="color:rgba(255,255,255,0.5);">Sube tus documentos PDF para procesarlos automáticamente.</p>
        <form method="POST" enctype="multipart/form-data" style="max-width:500px; margin:0 auto;">
            <div class="mb-3">
                <label class="form-label text-light">📄 Tipo de Documento</label>
                <select name="tipo" class="form-select">
                    <option value="facturas">Facturas</option>
                    <option value="boletas">Boletas</option>
                    <option value="percepciones">Percepciones</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label text-light">📅 Mes</label>
                <select name="mes" class="form-select">
                    {% for m in range(1, 13) %}
                        <option value="{{ m }}" {% if m == 5 %}selected{% endif %}>{{ ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][m-1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label text-light">📅 Año</label>
                <input type="number" name="año" class="form-control" value="2026">
            </div>
            <div class="mb-3">
                <label class="form-label text-light">📎 Selecciona archivos PDF</label>
                <input type="file" name="archivos" class="form-control" accept=".pdf" multiple>
            </div>
            <button type="submit" class="btn btn-primary w-100">📤 Subir y Procesar</button>
        </form>
    </div>
</div>
{% endblock %}
